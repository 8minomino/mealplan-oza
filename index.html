<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef9df">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="週間献立">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>週間献立プラン</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero__label">WEEKLY MEAL PLAN</div>
    <h1>週間献立プラン</h1>
    <p id="weekRange">読み込み中</p>
  </header>

  <main>
    <section class="summary" aria-label="基本方針">
      <div>
        <span>分量</span>
        <strong>夕食2名 + 翌日の母昼食1名</strong>
      </div>
      <div>
        <span>構成</span>
        <button class="outline-button" id="toggleWeek" type="button" aria-expanded="false" aria-controls="weekPanel">月から金の献立を見る</button>
      </div>
      <div>
        <span>買い物</span>
        <div class="week-actions" aria-label="表示する週を選択">
          <button class="secondary-button" id="prevWeek" type="button" aria-label="前の週">‹</button>
          <button class="secondary-button" id="currentWeek" type="button">今週</button>
          <button class="secondary-button" id="nextWeek" type="button" aria-label="次の週">›</button>
        </div>
        <small class="update-note" id="updateNote"></small>
      </div>
    </section>

    <section class="week-panel" id="weekPanel" hidden>
      <div class="section-title">
        <span>WEEKLY MENU</span>
        <h2>月から金の献立</h2>
      </div>
      <div class="week-table" id="weekTable"></div>
    </section>

    <section class="menu-section" id="menuSection" aria-labelledby="menuTitle">
      <div class="section-title section-title--compact">
        <span>DINNER</span>
        <h2 id="menuTitle">曜日別の献立</h2>
      </div>
      <nav class="day-tabs" id="dayTabs" role="tablist" aria-label="曜日選択"></nav>
      <p class="sr-only" id="mealStatus" aria-live="polite"></p>

      <section class="meal-card" id="mealCard" role="tabpanel"></section>
    </section>

    <section class="shopping" id="shoppingSection" aria-labelledby="shoppingTitle">
      <div class="section-title">
        <span>SHOPPING</span>
        <h2 id="shoppingTitle">月曜・木曜の買い物</h2>
      </div>
      <div class="shopping__grid" id="shoppingList"></div>
    </section>
  </main>

  <nav class="quick-nav" aria-label="画面内ナビゲーション">
    <a href="#menuSection" data-section="menuSection" data-icon="▤" aria-current="true">献立</a>
    <a href="#shoppingSection" data-section="shoppingSection" data-icon="□">買い物</a>
  </nav>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
